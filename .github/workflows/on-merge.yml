# See on-merge.yml
# When the pull request is manually reviewed and merged into the protected main branch, run the 
# 'on-merge' job. The job runs on an Ubuntu virtual machine and uses curl to trigger a deployment on render.com
# Your render instance will then pull the latest commit from the main branch and rebuild your app.
# See the next section on deployment for more detail

name: Document on-merge workflow for deployments

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}