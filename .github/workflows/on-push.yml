# This workflow runs every time you push to the 'feature/login' or 'main' branches
# It installs dependencies and runs tests to ensure the code is stable.

name: Node.js CI on Push

on:
  push:
    branches: [ "main", "feature/login" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches most modern BCIT lab environments
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests defined yet"