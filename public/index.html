<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5c1bbe2411.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/main.css">
    <title>AI Barbershop Calendar</title>
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon"><i class="fa-solid fa-scissors"></i></div>
                <div class="title-container">
                    <h1>AI Barbershop Appointment Calendar</h1>
                    <p class="breadcrumbs">Calendar overview &rarr; Day detail &rarr; Booking details</p>
                </div>
            </div>
            <div class="user-actions" id="user-nav">
                </div>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="stats-row">
            <div class="stat-card">
                <h2 id="total-bookings" class="stat-number">0</h2>
                <p class="stat-label">Total bookings</p>
            </div>
            <div class="stat-card">
                <h2 id="booked-days" class="stat-number">0</h2>
                <p class="stat-label">Booked days</p>
            </div>
            <div class="stat-card">
                <h2 id="selected-day-bookings" class="stat-number">0</h2>
                <p class="stat-label">Selected day bookings</p>
            </div>
        </section>

        <section class="layout-grid">
            <div class="calendar-card">
                <div class="calendar-header">
                    <h2 id="current-month-year">Month Year</h2>
                    <div class="calendar-controls">
                        <button id="prev-month" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="today-btn" class="text-btn">Today</button>
                        <button id="next-month" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                
                <div class="calendar-grid-header">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-days" class="calendar-grid">
                    </div>
            </div>

            <div class="detail-card">
                <div class="detail-header">
                    <div class="detail-header-text">
                        <h2 id="detail-date-title">Select a Date</h2>
                        <p id="detail-count" class="detail-subtitle">0 bookings</p>
                    </div>
                    <button id="add-btn" class="btn-primary small-btn">+ Add Booking</button>
                </div>
                <div id="appointment-list" class="appointment-list">
                    <div class="empty-state">Loading appointments...</div>
                </div>
            </div>
        </section>
    </main>

    <div id="appointment-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Appointment</h2>
                <button id="close-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="appointment-form">
                <input type="hidden" id="app-id">
                <div class="input-group">
                    <label for="app-name">Client Name</label>
                    <input type="text" id="app-name" required placeholder="e.g. John Doe">
                </div>
                <div class="input-group">
                    <label for="app-date">Date</label>
                    <input type="date" id="app-date" required>
                </div>
                <div class="input-group">
                    <label for="app-time">Time</label>
                    <input type="time" id="app-time" required>
                </div>
                <div class="input-group">
                    <label for="app-phone">Phone Number</label>
                    <input type="tel" id="app-phone" required placeholder="e.g. 555-0198">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Appointment</button>
            </form>
        </div>
    </div>

    <script src="js/calendar.js"></script>
</body>
</html>
