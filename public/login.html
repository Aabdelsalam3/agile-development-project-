<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5c1bbe2411.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login.css">
    <title>Login - AI Barbershop</title>
</head>
<body class="login-body">

    <main class="login-container">
        <section class="login-box">
            <div class="login-logo"><i class="fa-solid fa-scissors"></i></div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to manage appointments</p>
            
            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            
            <p id="login-message" aria-live="polite"></p>
            
            <div class="login-links">
                <p><a href="#">Forgot Password?</a></p>
            </div>
        </section>
    </main>

    <script src="/js/login.js"></script>
</body>
</html>
